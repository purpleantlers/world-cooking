<!doctype html>
<!--
  GitHub Pages serves static files, so a direct visit or refresh on a
  client-side route (e.g. /world-cooking/passport) has no matching file
  and GitHub Pages falls back to this 404 page. This script encodes the
  attempted path into a query string and redirects to the real index.html,
  which then decodes it and hands it to React Router. This is the standard
  SPA-on-GitHub-Pages workaround (see rafgraph/spa-github-pages).
-->
<html>
  <head>
    <meta charset="utf-8" />
    <title>World Cooking</title>
    <script>
      var pathSegmentsToKeep = 1 // keeps "/world-cooking" from the base path

      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
